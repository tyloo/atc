name: 🐛 Bug report
description: Report a defect in tyloo/atc.
title: "bug: <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the problem.
    validations:
      required: true

  - type: dropdown
    id: php-version
    attributes:
      label: PHP version
      options:
        - "8.4"
        - "8.5"
    validations:
      required: true

  - type: dropdown
    id: symfony-version
    attributes:
      label: Symfony version
      options:
        - "7.x"
        - "8.x"
    validations:
      required: true

  - type: input
    id: atc-version
    attributes:
      label: atc version
      description: The installed version of `tyloo/atc` (e.g. 0.1.0, dev-main).
      placeholder: 0.1.0
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal failing test that demonstrates the bug.
      render: php
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Stack trace / logs
      description: Paste any relevant stack trace or log output.
      render: text
    validations:
      required: false
